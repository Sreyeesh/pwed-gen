<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #e8e8e8;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .output-wrap {
    position: relative;
    margin-bottom: 2rem;
  }

  .output {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 52px 18px 18px;
    width: 100%;
    word-break: break-all;
    line-height: 1.6;
    min-height: 64px;
    transition: border-color 0.2s;
  }

  .output.flash { border-color: #555; }

  .copy-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: var(--muted);
    transition: color 0.15s;
    line-height: 1;
  }

  .copy-btn:hover { color: var(--text); }

  .copy-btn svg { display: block; width: 16px; height: 16px; }

  .strength {
    display: flex;
    gap: 3px;
    margin-bottom: 2rem;
  }

  .seg {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    transition: background 0.3s;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    margin-bottom: 2rem;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .row-label {
    font-size: 13px;
    font-weight: 300;
    color: var(--muted);
    white-space: nowrap;
  }

  .row-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    justify-content: flex-end;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 1px;
    background: var(--border);
    outline: none;
    border-radius: 1px;
    max-width: 160px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
  }

  .val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    min-width: 24px;
    text-align: right;
  }

  .toggle {
    position: relative;
    width: 32px;
    height: 18px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    left: 3px; top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }

  .toggle input:checked + .slider { background: #2a2a2a; }
  .toggle input:checked + .slider::before { transform: translateX(14px); background: var(--text); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0.4rem 0;
  }

  .gen-btn {
    width: 100%;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .gen-btn:hover { color: var(--text); border-color: #444; }
  .gen-btn:active { transform: scale(0.99); }

  .meta {
    display: flex;
    justify-content: space-between;
    margin-top: 1.5rem;
  }

  .meta-item {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <div class="wordmark">sreyeesh / pwd-gen</div>

  <div class="output-wrap">
    <div class="output" id="pw-out">—</div>
    <button class="copy-btn" onclick="doCopy()" title="Copy">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="5" y="5" width="9" height="9" rx="1"/>
        <path d="M3 11V3a1 1 0 0 1 1-1h8"/>
      </svg>
    </button>
  </div>

  <div class="strength">
    <div class="seg" id="s0"></div>
    <div class="seg" id="s1"></div>
    <div class="seg" id="s2"></div>
    <div class="seg" id="s3"></div>
  </div>

  <div class="controls">
    <div class="row">
      <span class="row-label">Length</span>
      <div class="row-right">
        <input type="range" id="len" min="8" max="64" value="20" oninput="sync()" />
        <span class="val" id="len-v">20</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <span class="row-label">Uppercase A–Z</span>
      <label class="toggle"><input type="checkbox" id="upper" checked onchange="gen()"><span class="slider"></span></label>
    </div>
    <div class="row">
      <span class="row-label">Lowercase a–z</span>
      <label class="toggle"><input type="checkbox" id="lower" checked onchange="gen()"><span class="slider"></span></label>
    </div>
    <div class="row">
      <span class="row-label">Numbers 0–9</span>
      <label class="toggle"><input type="checkbox" id="digits" checked onchange="gen()"><span class="slider"></span></label>
    </div>
    <div class="row">
      <span class="row-label">Symbols !@#…</span>
      <label class="toggle"><input type="checkbox" id="syms" checked onchange="gen()"><span class="slider"></span></label>
    </div>
  </div>

  <button class="gen-btn" onclick="gen()">↺ &nbsp;Generate</button>

  <div class="meta">
    <span class="meta-item" id="entropy-label">entropy: —</span>
    <span class="meta-item">crypto.getRandomValues</span>
  </div>
</div>

<div class="toast" id="toast">copied</div>

<script>
const U = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const L = 'abcdefghijklmnopqrstuvwxyz';
const D = '0123456789';
const S = '!@#$%^&*()-_=+[]{}|;:,.<>?';
let pw = '';

function sync() {
  document.getElementById('len-v').textContent = document.getElementById('len').value;
  gen();
}

function gen() {
  const useU = document.getElementById('upper').checked;
  const useL = document.getElementById('lower').checked;
  const useD = document.getElementById('digits').checked;
  const useS = document.getElementById('syms').checked;
  const len = parseInt(document.getElementById('len').value);

  let pool = '';
  let req = [];
  if (useU) { pool += U; req.push(U); }
  if (useL) { pool += L; req.push(L); }
  if (useD) { pool += D; req.push(D); }
  if (useS) { pool += S; req.push(S); }
  if (!pool) { document.getElementById('pw-out').textContent = '—'; pw = ''; return; }

  const rnd = new Uint32Array(len);
  crypto.getRandomValues(rnd);
  let arr = Array.from(rnd).map(n => pool[n % pool.length]);

  req.forEach((chars, i) => {
    const r2 = new Uint32Array(1);
    crypto.getRandomValues(r2);
    arr[i % len] = chars[r2[0] % chars.length];
  });

  for (let i = arr.length - 1; i > 0; i--) {
    const r3 = new Uint32Array(1);
    crypto.getRandomValues(r3);
    const j = r3[0] % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  pw = arr.join('');
  const out = document.getElementById('pw-out');
  out.textContent = pw;
  out.classList.add('flash');
  setTimeout(() => out.classList.remove('flash'), 200);

  const bits = Math.round(Math.log2(Math.pow(pool.length, len)));
  document.getElementById('entropy-label').textContent = `entropy: ~${bits} bits`;
  updateStrength(bits);
}

function updateStrength(bits) {
  const levels = [
    bits < 40  ? '#c0392b' : '',
    bits >= 40 ? '#e67e22' : '',
    bits >= 60 ? '#f1c40f' : '',
    bits >= 80 ? '#27ae60' : '',
  ];
  const segs = [
    bits >= 10 ? (bits < 40 ? '#c0392b' : bits < 60 ? '#e67e22' : bits < 80 ? '#f1c40f' : '#27ae60') : '',
    bits >= 40 ? (bits < 60 ? '#e67e22' : bits < 80 ? '#f1c40f' : '#27ae60') : '',
    bits >= 60 ? (bits < 80 ? '#f1c40f' : '#27ae60') : '',
    bits >= 80 ? '#27ae60' : '',
  ];
  for (let i = 0; i < 4; i++) {
    document.getElementById('s' + i).style.background = segs[i] || '#2a2a2a';
  }
}

function doCopy() {
  if (!pw) return;
  navigator.clipboard.writeText(pw).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  });
}

gen();
</script>
</body>
</html>
